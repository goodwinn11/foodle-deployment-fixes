; PHP OPcache Optimization for Foodle API
; Reduces memory usage and improves performance

; Enable OPcache
opcache.enable=1
opcache.enable_cli=1

; Memory Configuration (optimized for 1GB API container)
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=10000

; Performance Settings
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.fast_shutdown=1
opcache.enable_file_override=1

; JIT Configuration (PHP 8+)
opcache.jit_buffer_size=100M
opcache.jit=tracing

; File Cache (secondary cache on disk)
opcache.file_cache=/tmp/opcache
opcache.file_cache_consistency_checks=0

; Optimization Level
opcache.optimization_level=0x7FFFFFFF

; Error Handling
opcache.error_log=/var/log/php/opcache_errors.log
opcache.log_verbosity_level=1

; Huge Code Pages (if supported by system)
opcache.huge_code_pages=1

; Preloading (requires PHP 7.4+)
; opcache.preload=/var/www/html/preload.php
; opcache.preload_user=www-data