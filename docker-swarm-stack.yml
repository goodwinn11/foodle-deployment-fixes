version: '3.8'

# Docker Swarm Stack Configuration for Foodle
# Provides orchestration, scaling, and high availability

x-deploy-policy: &default-deploy
  replicas: 2
  update_config:
    parallelism: 1
    delay: 10s
    failure_action: rollback
    monitor: 30s
    max_failure_ratio: 0.3
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 120s
  resources:
    limits:
      cpus: '0.5'
      memory: 512M
    reservations:
      cpus: '0.25'
      memory: 256M

networks:
  foodle_frontend:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"
  foodle_backend:
    driver: overlay
    internal: true
    driver_opts:
      encrypted: "true"
  foodle_database:
    driver: overlay
    internal: true
    driver_opts:
      encrypted: "true"

volumes:
  db_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=nfs-server.local,rw,nfsvers=4"
      device: ":/exports/foodle/db"
  
  cache_data:
    driver: local
  
  rabbitmq_data:
    driver: local

configs:
  nginx_config:
    file: ./nginx/nginx.conf
  php_config:
    file: ./php/php.ini
  mariadb_config:
    file: ./mariadb/optimization.cnf

secrets:
  db_password:
    external: true
  db_root_password:
    external: true
  jwt_secret:
    external: true
  rabbitmq_password:
    external: true

services:
  # ============================================================================
  # API SERVICE - Scalable PHP API
  # ============================================================================
  api:
    image: ${REGISTRY:-registry.gitlab.com}/foodle/api:${VERSION:-latest}
    networks:
      - foodle_frontend
      - foodle_backend
      - foodle_database
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
      placement:
        constraints:
          - node.role == worker
          - node.labels.type == api
        preferences:
          - spread: node.id
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`api.foodle.ae`)"
        - "traefik.http.routers.api.entrypoints=websecure"
        - "traefik.http.services.api.loadbalancer.server.port=80"
        - "traefik.http.services.api.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.api.loadbalancer.healthcheck.path=/v2/health"
        - "traefik.http.services.api.loadbalancer.healthcheck.interval=30s"
    secrets:
      - db_password
      - jwt_secret
      - rabbitmq_password
    configs:
      - source: php_config
        target: /usr/local/etc/php/php.ini
    environment:
      - PHP_MEMORY_LIMIT=512M
      - PHP_OPCACHE_ENABLE=1
      - DB_HOST=tasks.database
      - REDIS_HOST=tasks.cache
      - RABBITMQ_HOST=tasks.rabbitmq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/v2/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================================
  # WEBSITE SERVICE - React Frontend
  # ============================================================================
  website:
    image: ${REGISTRY:-registry.gitlab.com}/foodle/website:${VERSION:-latest}
    networks:
      - foodle_frontend
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      placement:
        constraints:
          - node.role == worker
        preferences:
          - spread: node.id
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.website.rule=Host(`foodle.ae`) || Host(`www.foodle.ae`)"
        - "traefik.http.routers.website.entrypoints=websecure"
        - "traefik.http.services.website.loadbalancer.server.port=5173"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================================
  # PANEL SERVICE - Admin Panel
  # ============================================================================
  panel:
    image: ${REGISTRY:-registry.gitlab.com}/foodle/panel:${VERSION:-latest}
    networks:
      - foodle_frontend
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      placement:
        constraints:
          - node.role == worker
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.panel.rule=Host(`panel.foodle.ae`)"
        - "traefik.http.routers.panel.entrypoints=websecure"
        - "traefik.http.services.panel.loadbalancer.server.port=80"
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================================
  # DATABASE SERVICE - MariaDB with Galera Cluster
  # ============================================================================
  database:
    image: mariadb:11.2
    networks:
      - foodle_database
    deploy:
      replicas: 1  # For Galera, use separate service definitions for each node
      update_config:
        parallelism: 0  # Never update database automatically
        delay: 0s
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M
      placement:
        constraints:
          - node.role == worker
          - node.labels.type == database
    volumes:
      - db_data:/var/lib/mysql
    secrets:
      - db_root_password
      - db_password
    configs:
      - source: mariadb_config
        target: /etc/mysql/conf.d/optimization.cnf
    environment:
      - MARIADB_ROOT_PASSWORD_FILE=/run/secrets/db_root_password
      - MARIADB_DATABASE=foodle
      - MARIADB_USER=foodle
      - MARIADB_PASSWORD_FILE=/run/secrets/db_password
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ============================================================================
  # CACHE SERVICE - Redis Cluster
  # ============================================================================
  cache:
    image: redis:7.2-alpine
    networks:
      - foodle_backend
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
      placement:
        constraints:
          - node.role == worker
        preferences:
          - spread: node.id
      endpoint_mode: dnsrr  # For Redis cluster
    volumes:
      - cache_data:/data
    command: >
      redis-server
      --maxmemory 100mb
      --maxmemory-policy allkeys-lru
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ============================================================================
  # MESSAGE QUEUE - RabbitMQ Cluster
  # ============================================================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    networks:
      - foodle_backend
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s
      restart_policy:
        condition: on-failure
        delay: 30s
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 256M
      placement:
        constraints:
          - node.role == worker
        preferences:
          - spread: node.id
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rabbitmq.rule=Host(`rabbitmq.foodle.ae`)"
        - "traefik.http.routers.rabbitmq.entrypoints=websecure"
        - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    secrets:
      - rabbitmq_password
    environment:
      - RABBITMQ_DEFAULT_USER=foodle
      - RABBITMQ_DEFAULT_PASS_FILE=/run/secrets/rabbitmq_password
      - RABBITMQ_ERLANG_COOKIE=foodle-cluster-cookie
      - RABBITMQ_USE_LONGNAME=true
      - RABBITMQ_CLUSTER_FORMATION=dns
      - RABBITMQ_CLUSTER_NAME=foodle-cluster
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # LOAD BALANCER - Traefik
  # ============================================================================
  traefik:
    image: traefik:v3.0
    networks:
      - foodle_frontend
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      placement:
        constraints:
          - node.role == manager
        preferences:
          - spread: node.id
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard.rule=Host(`traefik.foodle.ae`)"
        - "traefik.http.routers.dashboard.service=api@internal"
        - "traefik.http.routers.dashboard.middlewares=auth"
        - "traefik.http.middlewares.auth.basicauth.users=admin:$$2y$$10$$..."
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - target: 8080
        published: 8080
        protocol: tcp
        mode: ingress
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./ssl:/ssl:ro
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.swarmMode=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=admin@foodle.ae
      - --certificatesresolvers.letsencrypt.acme.storage=/ssl/acme.json
      - --metrics.prometheus=true
      - --log.level=INFO
      - --accesslog=true

  # ============================================================================
  # MONITORING - Prometheus
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    networks:
      - foodle_backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'

  # ============================================================================
  # MONITORING - Grafana
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    networks:
      - foodle_frontend
      - foodle_backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`grafana.foodle.ae`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=redis-datasource,mysql-datasource

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local