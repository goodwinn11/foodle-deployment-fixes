# Kubernetes Deployment Manifests for Foodle
# Complete production-ready configuration with high availability

---
apiVersion: v1
kind: Namespace
metadata:
  name: foodle
  labels:
    name: foodle
    environment: production

---
# ============================================================================
# CONFIGMAPS
# ============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: foodle-config
  namespace: foodle
data:
  api-url: "https://api.foodle.ae"
  website-url: "https://foodle.ae"
  panel-url: "https://panel.foodle.ae"
  db-host: "mariadb-service.foodle.svc.cluster.local"
  redis-host: "redis-service.foodle.svc.cluster.local"
  rabbitmq-host: "rabbitmq-service.foodle.svc.cluster.local"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: foodle
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        
        location / {
            try_files $uri $uri/ /index.html;
        }
        
        location /health {
            access_log off;
            return 200 "healthy\n";
        }
    }

---
# ============================================================================
# SECRETS
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: foodle-secrets
  namespace: foodle
type: Opaque
stringData:
  db-password: "changeme"
  db-root-password: "changeme"
  jwt-secret: "changeme"
  rabbitmq-password: "changeme"

---
# ============================================================================
# PERSISTENT VOLUMES
# ============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-pvc
  namespace: foodle
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: fast-ssd

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: foodle
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: fast-ssd

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-pvc
  namespace: foodle
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# ============================================================================
# API DEPLOYMENT
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: foodle-api
  namespace: foodle
  labels:
    app: foodle-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: foodle-api
  template:
    metadata:
      labels:
        app: foodle-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - foodle-api
              topologyKey: kubernetes.io/hostname
      containers:
      - name: api
        image: registry.gitlab.com/foodle/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: foodle-config
              key: db-host
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: foodle-secrets
              key: db-password
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: foodle-config
              key: redis-host
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: foodle-config
              key: rabbitmq-host
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: foodle-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /v2/health
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /v2/health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /v2/health
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      imagePullSecrets:
      - name: gitlab-registry

---
# ============================================================================
# WEBSITE DEPLOYMENT
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: foodle-website
  namespace: foodle
  labels:
    app: foodle-website
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: foodle-website
  template:
    metadata:
      labels:
        app: foodle-website
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - foodle-website
              topologyKey: kubernetes.io/hostname
      containers:
      - name: website
        image: registry.gitlab.com/foodle/website:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5173
          name: http
        env:
        - name: VITE_API_URL
          valueFrom:
            configMapKeyRef:
              name: foodle-config
              key: api-url
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 5173
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 5173
          initialDelaySeconds: 10
          periodSeconds: 10

---
# ============================================================================
# PANEL DEPLOYMENT
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: foodle-panel
  namespace: foodle
  labels:
    app: foodle-panel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: foodle-panel
  template:
    metadata:
      labels:
        app: foodle-panel
    spec:
      containers:
      - name: panel
        image: registry.gitlab.com/foodle/panel:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config

---
# ============================================================================
# MARIADB STATEFULSET
# ============================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: foodle
spec:
  serviceName: mariadb-service
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
      - name: mariadb
        image: mariadb:11.2
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: foodle-secrets
              key: db-root-password
        - name: MARIADB_DATABASE
          value: "foodle"
        - name: MARIADB_USER
          value: "foodle"
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: foodle-secrets
              key: db-password
        volumeMounts:
        - name: mariadb-storage
          mountPath: /var/lib/mysql
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "768Mi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - mariadb-admin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - mariadb-admin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: mariadb-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi

---
# ============================================================================
# REDIS DEPLOYMENT
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: foodle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        ports:
        - containerPort: 6379
          name: redis
        command:
        - redis-server
        - --maxmemory
        - 100mb
        - --maxmemory-policy
        - allkeys-lru
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "300m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc

---
# ============================================================================
# RABBITMQ STATEFULSET
# ============================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: foodle
spec:
  serviceName: rabbitmq-service
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3.12-management-alpine
        ports:
        - containerPort: 5672
          name: amqp
        - containerPort: 15672
          name: management
        env:
        - name: RABBITMQ_DEFAULT_USER
          value: "foodle"
        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              name: foodle-secrets
              key: rabbitmq-password
        volumeMounts:
        - name: rabbitmq-storage
          mountPath: /var/lib/rabbitmq
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "384Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - rabbitmq-diagnostics
            - check_running
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - rabbitmq-diagnostics
            - check_running
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: rabbitmq-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi

---
# ============================================================================
# SERVICES
# ============================================================================

apiVersion: v1
kind: Service
metadata:
  name: foodle-api-service
  namespace: foodle
  labels:
    app: foodle-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: foodle-api
  sessionAffinity: ClientIP

---
apiVersion: v1
kind: Service
metadata:
  name: foodle-website-service
  namespace: foodle
spec:
  type: ClusterIP
  ports:
  - port: 5173
    targetPort: 5173
    protocol: TCP
  selector:
    app: foodle-website

---
apiVersion: v1
kind: Service
metadata:
  name: foodle-panel-service
  namespace: foodle
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: foodle-panel

---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-service
  namespace: foodle
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 3306
    targetPort: 3306
  selector:
    app: mariadb

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: foodle
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: foodle
spec:
  type: ClusterIP
  ports:
  - port: 5672
    targetPort: 5672
    name: amqp
  - port: 15672
    targetPort: 15672
    name: management
  selector:
    app: rabbitmq

---
# ============================================================================
# INGRESS
# ============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foodle-ingress
  namespace: foodle
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
  - hosts:
    - foodle.ae
    - www.foodle.ae
    - api.foodle.ae
    - panel.foodle.ae
    secretName: foodle-tls
  rules:
  - host: foodle.ae
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: foodle-website-service
            port:
              number: 5173
  - host: www.foodle.ae
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: foodle-website-service
            port:
              number: 5173
  - host: api.foodle.ae
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: foodle-api-service
            port:
              number: 80
  - host: panel.foodle.ae
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: foodle-panel-service
            port:
              number: 80

---
# ============================================================================
# HORIZONTAL POD AUTOSCALING
# ============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: foodle-api-hpa
  namespace: foodle
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: foodle-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: foodle-website-hpa
  namespace: foodle
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: foodle-website
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
# ============================================================================
# NETWORK POLICIES
# ============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: foodle-network-policy
  namespace: foodle
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector: {}
  egress:
  - to:
    - podSelector: {}
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

---
# ============================================================================
# POD DISRUPTION BUDGETS
# ============================================================================

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: foodle-api-pdb
  namespace: foodle
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: foodle-api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: foodle-website-pdb
  namespace: foodle
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: foodle-website